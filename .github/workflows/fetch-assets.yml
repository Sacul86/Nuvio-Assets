name: Fetch Nuvio Assets

# Manual trigger only — click "Run workflow" in the Actions tab.
# API keys come from repo Settings → Secrets → Actions, so the only thing
# you ever need to decide at run time is whether to re-fetch existing tiles.
on:
  workflow_dispatch:
    inputs:
      overwrite:
        description: "Re-fetch images that already exist?"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Download Bebas Neue font
        run: |
          curl -fsSL -o /tmp/BebasNeue-Regular.ttf \
            https://github.com/google/fonts/raw/main/ofl/bebasneue/BebasNeue-Regular.ttf
          ls -la /tmp/BebasNeue-Regular.ttf

      - name: Generate assets
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          FANART_API_KEY: ${{ secrets.FANART_API_KEY }}
          OVERWRITE: ${{ inputs.overwrite && '1' || '0' }}
        run: python fetch_all_assets.py

      - name: Commit and push images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --staged --quiet; then
            echo "No new or changed images to commit."
          else
            git commit -m "Update Nuvio collection assets [skip ci]"
            git push
          fi

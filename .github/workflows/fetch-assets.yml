name: Fetch Nuvio Assets

# Manual trigger only — click "Run workflow" in the Actions tab.
on:
  workflow_dispatch:
    inputs:
      overwrite:
        description: "Re-fetch images that already exist?"
        type: boolean
        default: false

# Allow the workflow to commit the downloaded images back to the repo.
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch assets
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          OVERWRITE: ${{ inputs.overwrite && '1' || '0' }}
        run: python fetch_all_assets.py

      - name: Commit and push images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          if git diff --staged --quiet; then
            echo "No new or changed images to commit."
          else
            git commit -m "Update Nuvio collection assets [skip ci]"
            git push
          fi
